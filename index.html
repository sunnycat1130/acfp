<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFP / CFP® 新舊課綱對照工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#8a8888;
  --bg:#f4f3f0;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;
  --green:#27500A;--green-light:#EAF3DE;--green-mid:#97C459;
  --amber:#633806;--amber-light:#FAEEDA;--amber-mid:#FAC775;
  --red:#791F1F;--red-light:#FCEBEB;--red-mid:#F09595;
  --gray-mid:#B4B2A9;
  --border:rgba(0,0,0,0.09);
}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--bg);}
.shell{display:flex;flex-direction:column;height:100vh;}

/* Topbar */
.topbar{height:38px;background:var(--purple);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.topbar-title{color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
.topbar-badge{font-size:10px;background:rgba(255,255,255,.18);color:#fff;padding:2px 8px;border-radius:20px;}
.topbar-link{font-size:11px;color:rgba(255,255,255,.75);text-decoration:none;display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid rgba(255,255,255,.25);border-radius:5px;}
.topbar-link:hover{background:rgba(255,255,255,.12);}

/* Body */
.body{display:flex;flex:1;min-height:0;gap:8px;padding:8px;}

/* Left */
.left{width:200px;flex-shrink:0;display:flex;flex-direction:column;}
.form-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:11px;height:100%;}
.form-title{font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;}
.form-title::before{content:'';width:3px;height:15px;background:var(--purple);border-radius:2px;display:inline-block;}
.field-label{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:5px;letter-spacing:.03em;}
.field input[type=text]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:#fff;color:var(--ink);outline:none;transition:border-color .2s;}
.field input[type=text]:focus{border-color:var(--purple);}
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:5px;}
.radio-opt,.check-opt{position:relative;}
.radio-opt input,.check-opt input{position:absolute;opacity:0;width:0;height:0;}
.radio-opt label,.check-opt label{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;transition:all .15s;background:#fff;color:var(--ink2);user-select:none;}
.radio-opt label:hover,.check-opt label:hover{border-color:var(--purple-mid);background:var(--purple-light);}
.radio-opt input:checked+label,.check-opt input:checked+label{background:var(--purple-light);border-color:var(--purple-mid);color:var(--purple);font-weight:600;}
.radio-opt input:disabled+label,.check-opt input:disabled+label{opacity:.28;cursor:not-allowed;background:#f5f5f3;}
.check-opt input:checked+label::before{content:'✓';font-size:10px;font-weight:800;color:var(--purple);}
.fpat-inline{font-size:10.5px;color:#0C447C;text-decoration:none;}
.fpat-inline:hover{color:#042C53;}
.bottom-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border);}
.hint{font-size:11px;color:var(--ink3);}
.reset-btn{font-size:11px;color:var(--ink2);background:#fff;border:1px solid var(--border);padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.reset-btn:hover{background:#f0efec;}

/* Right */
.right{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.rpt-header{background:var(--purple);color:#fff;border-radius:10px;padding:7px 14px;flex-shrink:0;}
.report-name{font-size:14px;font-weight:700;}
.report-meta{font-size:11px;opacity:.78;display:flex;gap:7px;flex-wrap:wrap;}
.meta-pill{background:rgba(255,255,255,.18);border-radius:5px;padding:2px 8px;font-size:11px;}

/* Table */
.tbl-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;border:1px solid var(--border);border-radius:12px;background:#fff;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{background:#f0efec;font-weight:700;font-size:10px;letter-spacing:.04em;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);color:var(--ink2);position:sticky;top:0;z-index:2;}
td{padding:5px 8px;vertical-align:top;border-bottom:1px solid var(--border);line-height:1.45;}
tr:last-child td{border-bottom:none;}

.col1-done{background:#edf7e4;}
.col1-undone{background:#f7f7f5;}
.col1-undone *{color:var(--ink3)!important;}
.col2-done{background:#edf7e4;}
.col2-notneeded *{color:var(--ink3)!important;}
.col4-action{}
.col4-done{}
.col4-exempt{}
.col4-none{}

.pill{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:3px;margin:1px 2px 1px 0;letter-spacing:.02em;}
.pill-must{background:#534AB7;color:#fff;}
.pill-pick{background:#185FA5;color:#fff;}
.pill-done{background:#3B6D11;color:#fff;}
.pill-cfp{background:#854F0B;color:#fff;}
.pill-no{background:var(--gray-mid);color:#fff;}
.pill-bridge{background:#D85A30;color:#fff;}

.nm-name{font-weight:700;color:var(--ink);font-size:12px;}
.no-exempt-sm{font-size:10px;color:var(--red);font-weight:600;}
.action-needed{font-size:11px;font-weight:700;color:#791F1F;line-height:1.5;}
.action-done{font-size:11px;color:var(--green);font-weight:600;}
.action-bridge{font-size:11px;font-weight:700;color:#993C1D;line-height:1.4;}
.action-skip{font-size:11px;color:var(--ink3);}

/* Bottom */
.bottom-strip{flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.summary-area{display:flex;flex-direction:column;gap:4px;}
.summary-box{border-radius:8px;padding:5px 10px;border:1px solid;}
.summary-pass{background:var(--green-light);border-color:var(--green-mid);}
.summary-warn{background:var(--amber-light);border-color:var(--amber-mid);}
.summary-bridge{background:var(--red-light);border-color:var(--red-mid);}
.summary-title{font-size:11px;font-weight:700;margin-bottom:2px;}
.summary-body{font-size:10.5px;line-height:1.55;color:var(--ink2);}
.summary-body ul{padding-left:14px;margin-top:2px;}
.summary-body li{margin-bottom:1px;}
.std-box{background:#f0efec;border-radius:8px;padding:6px 12px;border:1px solid var(--border);}
.std-body{font-size:10px;color:var(--ink2);line-height:1.65;}
.std-body strong{color:var(--ink);}

/* Exempt button */
.exempt-btn{font-size:10px;font-weight:500;color:#5F5E5A;background:#f0efec;border:1px solid var(--gray-mid);border-radius:4px;padding:2px 8px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;}
.exempt-btn:hover{background:#e0dfdb;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .15s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:#fff;border-radius:14px;padding:20px 22px;width:440px;max-width:90vw;}
.modal-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.modal-body{font-size:12px;color:var(--ink2);line-height:1.75;}
.modal-item{padding:5px 0;border-bottom:1px dashed var(--border);}
.modal-item:last-child{border-bottom:none;}
.modal-warn{color:var(--red);font-weight:600;}
.modal-close{margin-top:14px;width:100%;padding:8px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.modal-close:hover{opacity:.85;}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="topbar-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      AFP / CFP® 新舊課綱對照工具
      <span class="topbar-badge">新課綱 2026/5</span>
    </div>
    <a href="https://www.fpat.org.tw/Login" target="_blank" class="topbar-link">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      FPAT 官網
    </a>
  </div>

  <div class="body">

    <div class="left">
      <div class="form-card">
        <div class="form-title">學員資料輸入</div>

        <div class="field">
          <div class="field-label">01 &nbsp;學員姓名</div>
          <input type="text" id="name" placeholder="請輸入學員姓名" oninput="generate()">
        </div>

        <div class="field">
          <div class="field-label">02 &nbsp;學員身分</div>
          <div class="radio-group">
            <div class="radio-opt"><input type="radio" name="type" id="t-new" value="new" checked onchange="onTypeChange()"><label for="t-new">全新學員</label></div>
            <div class="radio-opt"><input type="radio" name="type" id="t-old" value="old" onchange="onTypeChange()"><label for="t-old">舊課綱學員</label></div>
          </div>
        </div>

        <div class="field">
          <div class="field-label">03 &nbsp;舊課綱已完訓模組</div>
          <div class="check-group" id="old-checks" style="display:grid;grid-template-columns:repeat(3,auto);gap:5px;justify-content:start;">
            <div class="check-opt"><input type="checkbox" id="om1" value="M1" disabled onchange="generate()"><label for="om1">M1</label></div>
            <div class="check-opt"><input type="checkbox" id="om2" value="M2" disabled onchange="generate()"><label for="om2">M2</label></div>
            <div class="check-opt"><input type="checkbox" id="om3" value="M3" disabled onchange="generate()"><label for="om3">M3</label></div>
            <div class="check-opt"><input type="checkbox" id="om4" value="M4" disabled onchange="generate()"><label for="om4">M4</label></div>
            <div class="check-opt"><input type="checkbox" id="om5" value="M5" disabled onchange="generate()"><label for="om5">M5</label></div>
            <div class="check-opt"><input type="checkbox" id="om6" value="M6" disabled onchange="generate()"><label for="om6">M6</label></div>
          </div>
          <a href="https://www.fpat.org.tw/Login" target="_blank" class="fpat-inline" style="display:inline-block;margin-top:7px;">按此登錄協會查詢完訓紀錄 ↗</a>
        </div>

        <div class="field">
          <div class="field-label">04 &nbsp;考照目標</div>
          <div class="radio-group">
            <div class="radio-opt"><input type="radio" name="goal" id="g-afp" value="AFP" checked onchange="onGoalChange()"><label for="g-afp">AFP</label></div>
            <div class="radio-opt"><input type="radio" name="goal" id="g-cfp" value="CFP" disabled onchange="onGoalChange()"><label for="g-cfp">CFP®</label></div>
          </div>
        </div>

        <div class="bottom-row">
          <span class="hint">資料變更即時更新</span>
          <button class="reset-btn" onclick="reset()">重新輸入</button>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="rpt-header" id="rpt-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="report-name">學員</div>
          <div class="report-meta"><span class="meta-pill">全新學員</span><span class="meta-pill">考照目標：AFP</span></div>
        </div>
      </div>

      <div class="tbl-wrap">
        <table id="rpt-table"></table>
      </div>

      <div class="bottom-strip">
        <div class="summary-area" id="rpt-summary"></div>
        <div class="std-box">
          <div class="std-body">
            <strong>AFP 報考條件：</strong>須完成 NM5、NM6、NM7 三科必修，加上 NM1～NM4 中任意 2 科以上選修，合計至少 5 科，方可報名。<br>
            <strong>CFP 報考條件：</strong>在 AFP 條件基礎上，須另外完訓 NM8（40小時，無任何抵免），並須先通過 AFP 測驗（成績保留 5 年），始得報考 CFP 測驗。
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
const NM_DATA=[
  {id:'NM1',name:'基礎理財規劃',role:'pick',
   exempt:['理財規劃人員(FPA) + 5年內有效 CM（金融市場常識與職業道德）','⚠ 抵免後仍須補修「理財規劃心理學」4小時銜接課程']},
  {id:'NM2',name:'財務管理',role:'pick',
   exempt:['理財規劃人員(FPA) + 5年內有效 CM','國內財務金融／財務管理系所學士或碩士畢業']},
  {id:'NM3',name:'風險管理與保險規劃',role:'pick',
   exempt:['人身保險業務員(PA) + CM（5年內有效）+ 2年以上保險相關工作經驗（須附在職證明）']},
  {id:'NM4',name:'投資規劃與資產配置',role:'pick',
   exempt:['證券商高級營業員','投信投顧業務員','信託業務員 + 投信投顧相關法規','證券商業務員 + CM + 2年證券工作經驗','財務金融/財務管理系所學士或碩士（5年內）','投資型保險業務員 + 證交法規 + CM + 2年證券工作經驗']},
  {id:'NM5',name:'退休規劃',role:'must',
   exempt:['RFA 退休理財規劃顧問證照（須透過RFA協會系統認列）']},
  {id:'NM6',name:'稅務規劃',role:'must',
   exempt:['財政／財稅系所學士或碩士畢業（5年內）','⚠ 無任何證照抵免途徑，只能以學歷或完訓課程取得']},
  {id:'NM7',name:'財富傳承規劃',role:'must',
   exempt:['法律系所學士或碩士畢業（5年內）','家族信託規劃顧問師證照']},
  {id:'NM8',name:'綜合理財規劃',role:'cfp',
   exempt:['⚠ 無任何抵免，一律須完訓40小時課程']}
];

const OLD_MAP={M1:['NM1','NM2'],M2:['NM3'],M3:['NM5'],M4:['NM4'],M5:['NM6','NM7'],M6:['NM8']};
const ROWS=[
  {old:'M1',oldName:'基礎理財規劃',nms:['NM1','NM2']},
  {old:'M2',oldName:'風險管理與保險規劃',nms:['NM3']},
  {old:'M3',oldName:'員工福利與退休金規劃',nms:['NM5']},
  {old:'M4',oldName:'投資規劃',nms:['NM4']},
  {old:'M5',oldName:'租稅與財產移轉規劃',nms:['NM6','NM7']},
  {old:'M6',oldName:'全方位理財規劃',nms:['NM8']},
];

function onTypeChange(){
  const isOld=document.getElementById('t-old').checked;
  document.querySelectorAll('#old-checks input[type=checkbox]').forEach(c=>{c.disabled=!isOld;if(!isOld)c.checked=false;});
  document.getElementById('g-cfp').disabled=!isOld;
  if(!isOld)document.getElementById('g-afp').checked=true;
  generate();
}
function onGoalChange(){generate();}
function getOldDone(){return[...document.querySelectorAll('#old-checks input:checked')].map(c=>c.value);}
function getMappedNM(oldDone){const s=new Set();oldDone.forEach(m=>{(OLD_MAP[m]||[]).forEach(n=>s.add(n));});return s;}

function openModal(nmId){
  const nm=NM_DATA.find(n=>n.id===nmId);
  document.getElementById('modal-title').textContent=nm.id+' '+nm.name+' — 抵免標準';
  document.getElementById('modal-body').innerHTML=nm.exempt.map(e=>
    '<div class="modal-item">'+(e.startsWith('⚠')?'<span class="modal-warn">'+e+'</span>':e)+'</div>'
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function generate(){
  const name=document.getElementById('name').value.trim();
  const isOld=document.getElementById('t-old').checked;
  const goal=document.querySelector('input[name=goal]:checked').value;
  const oldDone=isOld?getOldDone():[];
  const mappedNM=getMappedNM(oldDone);

  document.getElementById('rpt-header').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">'+
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'+
    '<div class="report-name">'+(name?name+'&nbsp;':'')+'學員</div>'+
    '<div class="report-meta">'+
    '<span class="meta-pill">'+(isOld?'舊課綱學員':'全新學員')+'</span>'+
    '<span class="meta-pill">考照目標：'+goal+(goal==='CFP'?'®':'')+'</span>'+
    (isOld&&oldDone.length>0?'<span class="meta-pill">已完訓：'+oldDone.join('、')+'</span>':'')+
    '</div></div>'+
    '<a href="https://www.fpat.org.tw/Message/Detail/4ce1844d-8924-4136-9419-27840cf8da79" target="_blank" style="font-size:11px;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:4px 10px;text-decoration:none;white-space:nowrap;flex-shrink:0;">課程抵免資訊 ↗</a>'+
    '</div>';

  const bridgeList=[];
  const pickDone=['NM1','NM2','NM3','NM4'].filter(m=>mappedNM.has(m));
  const pickMet=pickDone.length>=2;

  let html='<thead><tr>'+
    '<th style="width:18%">舊課綱模組</th>'+
    '<th style="width:35%">新課綱對應模組</th>'+
    '<th style="width:47%">需補修情況</th>'+
    '</tr></thead><tbody>';

  ROWS.forEach(function(row){
    const oldCompleted=isOld&&oldDone.includes(row.old);
    const nmCount=row.nms.length;
    row.nms.forEach(function(nmId,idx){
      const nm=NM_DATA.find(function(n){return n.id===nmId;});
      const nmDone=mappedNM.has(nmId);
      const isAfpMust=nm.role==='must';
      const isAfpPick=nm.role==='pick';
      const isCfpOnly=nm.role==='cfp';

      let bridgeNote='';
      if(isOld&&oldCompleted){
        if(nmId==='NM1'){
          bridgeNote='<div style="margin-top:4px"><span class="pill pill-bridge">銜接課程</span><span style="font-size:9.5px;color:#993C1D"> 理財規劃心理學 4h</span></div>';
          if(bridgeList.indexOf('NM1「理財規劃心理學」4小時銜接課程')<0)bridgeList.push('NM1「理財規劃心理學」4小時銜接課程');
        }
        if(nmId==='NM8'){
          bridgeNote='<div style="margin-top:4px"><span class="pill pill-bridge">銜接課程</span><span style="font-size:9.5px;color:#993C1D"> 綜合實務案例12h＋理財規劃書制定12h</span></div>';
          if(bridgeList.indexOf('NM8 銜接課程（綜合實務案例12h＋理財規劃書制定12h）')<0)bridgeList.push('NM8 銜接課程（綜合實務案例12h＋理財規劃書制定12h）');
        }
      }

      const col1Class=oldCompleted?'col1-done':'col1-undone';
      let col1Content='';
      if(idx===0){
        col1Content=
          '<div style="font-weight:'+(oldCompleted?700:400)+';font-size:11px">'+row.old+' '+row.oldName+'</div>'+
          (!isOld
            ?'<div style="font-size:9.5px;margin-top:3px;color:var(--ink3)">新學員</div>'
            :oldCompleted
              ?'<div style="display:inline-block;font-size:9.5px;padding:1px 6px;background:#3B6D11;color:#fff;border-radius:3px;margin-top:4px">已完訓</div>'
              :'<div style="font-size:9.5px;margin-top:3px;color:var(--ink3)">未完訓</div>');
      }

      const rolePill=isAfpMust?'<span class="pill pill-must">必修</span>'
        :isAfpPick?'<span class="pill pill-pick">選修</span>'
        :(isCfpOnly&&goal==='CFP')?'<span class="pill pill-cfp">CFP®必修</span>'
        :'<span class="pill pill-no">AFP不需修</span>';

      const col2Class=nmDone?'col2-done'
        :isAfpMust?'col2-must'
        :isAfpPick?'col2-pick'
        :(isCfpOnly&&goal==='CFP')?'col2-cfponly'
        :'col2-notneeded';

      const col3Content=nm.exempt.length>0
        ?'<button class="exempt-btn" onclick="openModal(\''+nmId+'\')">抵免資訊</button>'
        :'<span class="no-exempt-sm">無抵免</span>';

      let col4Class,col4Content;
      if(nmDone){
        if(bridgeNote){
          col4Class='col4-action';
          col4Content='<div class="action-bridge"><span class="pill pill-bridge">需補修</span> 銜接課程'+(nmId==='NM8'?'（24小時）':'（4小時）')+'</div>'+bridgeNote;
        }else{
          col4Class='col4-done';
          col4Content='<div class="action-done"><span class="pill pill-done">已完訓</span> ✓ 無需補修</div>';
        }
      }else if(isCfpOnly&&goal==='AFP'){
        col4Class='col4-none';col4Content='<div class="action-skip">AFP 目標無需修習</div>';
      }else if(isAfpMust){
        col4Class='col4-action';col4Content='<div class="action-needed">必修，缺一不可</div>';
      }else if(isAfpPick){
        if(pickMet){
          col4Class='col4-none';col4Content='<div style="font-size:11px;color:#5F5E5A">選修已達標，可視需求修習</div>';
        }else{
          col4Class='col4-action';col4Content='<div class="action-needed">選修，NM1~NM4 需選滿 2 科</div>';
        }
      }else if(isCfpOnly&&goal==='CFP'){
        col4Class='col4-action';col4Content='<div class="action-needed">CFP®必修，無任何抵免</div>';
      }else{
        col4Class='col4-exempt';col4Content='<div style="font-size:11px;color:var(--purple)">可申請抵免</div>';
      }

      if(idx===0){
        html+='<tr>'+
          '<td class="'+col1Class+'" rowspan="'+nmCount+'" style="border-right:1px solid var(--border)">'+col1Content+'</td>'+
          '<td class="'+col2Class+'"><div class="nm-name">'+rolePill+' '+nm.id+' '+nm.name+'</div>'+bridgeNote+'</td>'+
          '<td class="'+col4Class+'">'+col4Content+'</td>'+
          '</tr>';
      }else{
        html+='<tr>'+
          '<td class="'+col2Class+'"><div class="nm-name">'+rolePill+' '+nm.id+' '+nm.name+'</div>'+bridgeNote+'</td>'+
          '<td class="'+col4Class+'">'+col4Content+'</td>'+
          '</tr>';
      }
    });
  });

  html+='</tbody>';
  document.getElementById('rpt-table').innerHTML=html;

  const hasMust=['NM5','NM6','NM7'].every(function(m){return mappedNM.has(m);});
  const afpOk=hasMust&&pickMet;
  const cfpCourseOk=afpOk&&mappedNM.has('NM8');
  let sumHtml='';

  if(bridgeList.length>0){
    sumHtml+='<div class="summary-box summary-bridge">'+
      '<div class="summary-title" style="color:var(--red)">須先完成以下銜接課程才能報考</div>'+
      '<div class="summary-body"><ul>'+bridgeList.map(function(b){return'<li>'+b+'</li>';}).join('')+'</ul></div>'+
      '</div>';
  }
  if(afpOk){
    sumHtml+='<div class="summary-box summary-pass">'+
      '<div class="summary-title" style="color:var(--green)">AFP 課程條件：達標</div>'+
      '<div class="summary-body">必修（NM5/NM6/NM7）及選修（'+pickDone.join('、')+'）均已完成，可報名 AFP 測驗。'+(bridgeList.length>0?'<br><strong>注意：</strong>報考前須先完成上方銜接課程。':'')+'</div>'+
      '</div>';
  }
  if(goal==='CFP'){
    if(cfpCourseOk){
      sumHtml+='<div class="summary-box summary-pass">'+
        '<div class="summary-title" style="color:var(--green)">CFP® 課程條件：達標</div>'+
        '<div class="summary-body">NM1–NM8 均已完成，通過 AFP 測驗後即可申請報考 CFP® 測驗。</div>'+
        '</div>';
    }else{
      sumHtml+='<div class="summary-box summary-warn">'+
        '<div class="summary-title" style="color:var(--amber)">CFP® 課程條件：'+(afpOk?'尚需完成 NM8':'AFP 條件尚未達標')+'</div>'+
        '<div class="summary-body">'+(afpOk
          ?'AFP 條件已達，尚須完訓 <strong>NM8（40小時）</strong>，無任何抵免，須全程上課。完成後通過 AFP 測驗即可報考 CFP®。'
          :'請先滿足 AFP 報考條件，再追加完訓 NM8（40小時，無抵免），通過 AFP 測驗後方可報考 CFP®。')+
        '</div></div>';
    }
  }
  document.getElementById('rpt-summary').innerHTML=sumHtml;
}

function reset(){
  document.getElementById('name').value='';
  document.getElementById('t-new').checked=true;
  document.getElementById('g-afp').checked=true;
  document.querySelectorAll('#old-checks input').forEach(function(c){c.checked=false;c.disabled=true;});
  document.getElementById('g-cfp').disabled=true;
  generate();
}

generate();
</script>
</body>
</html>
